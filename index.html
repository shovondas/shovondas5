<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase অনলাইন MCQ পরীক্ষা</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .quiz-container, .start-container { background-color: #fff; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 800px; padding: 20px; box-sizing: border-box; }
        .start-container { text-align: center; margin-top: 50px; }
        h1 { color: #333; }
        .timer-box { position: sticky; top: 10px; background-color: #ff4757; color: white; padding: 12px 25px; border-radius: 30px; font-size: 22px; font-weight: bold; text-align: center; margin-bottom: 20px; z-index: 1000; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .question-card { margin-bottom: 25px; padding: 20px; background-color: #fff; border: 1px solid #e0e0e0; border-radius: 6px; }
        .question-text { font-size: 18px; font-weight: 600; color: #2c3e50; margin-bottom: 15px; }
        .options-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 600px) { .options-container { grid-template-columns: 1fr; } }
        .option-label { background-color: #f8f9fa; border: 1px solid #ced4da; padding: 12px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; font-size: 16px; transition: 0.2s; }
        .option-label:hover { background-color: #e9ecef; }
        .option-label input { margin-right: 12px; transform: scale(1.2); }
        .btn { background-color: #2ed573; color: white; border: none; padding: 12px 30px; font-size: 18px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background-color: #26af5f; }
        .input-field { padding: 10px; font-size: 16px; width: 80%; max-width: 300px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; }
        .result-box { display: none; background-color: #d1e7dd; color: #0f5132; padding: 25px; border-radius: 6px; text-align: center; font-size: 22px; margin-bottom: 25px; border: 1px solid #badbcc; line-height: 1.6; }
        .correct-answer { background-color: #d1e7dd !important; border-color: #a3cfbb !important; color: #0f5132; font-weight: bold; }
        .wrong-answer { background-color: #f8d7da !important; border-color: #f5c2c7 !important; color: #842029; }
        #loading { font-size: 20px; font-weight: bold; color: #666; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="start-container" id="start-screen">
        <h1>অনলাইন MCQ পরীক্ষা (Supabase)</h1>
        <p>পরীক্ষা শুরু করতে আপনার নাম লিখুন (সময়: ২৫ মিনিট)</p>
        <input type="text" id="student-name" class="input-field" placeholder="আপনার নাম লিখুন..." required><br>
        <button class="btn" onclick="startQuiz()">পরীক্ষা শুরু করুন</button>
        <p id="loading" style="display:none;">Supabase থেকে প্রশ্ন লোড হচ্ছে, অপেক্ষা করুন...</p>
    </div>

    <div class="timer-box" id="timer-box">অবशिष्ट সময়: <span id="timer">25:00</span></div>

    <div class="quiz-container" id="quiz-screen" style="display: none;">
        <div id="result" class="result-box"></div>
        <form id="quiz-form">
            <div id="questions-container"></div>
            <button type="button" class="btn" id="submit-btn" style="display:block; margin:30px auto;" onclick="submitQuiz()">পরীক্ষা শেষ করুন (Submit)</button>
        </form>
    </div>

    <script>
        // ⚠️ আপনার সুপাবেস-এর প্রজেক্ট URL এবং anon key এখানে বসান
        const SUPABASE_URL = 'https://eqjfxdprejkdppicitqj.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxamZ4ZHByZWprZHBwaWNpdHFqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MzQxNzA1MCwiZXhwIjoyMDk4OTkzMDUwfQ.NseAq3rLv6VySJGGFjV8a5xBzbQK3vV8cCzZPinpNfA';

        // Supabase ক্লায়েন্ট ইনিশিয়ালাইজ করা
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let quizData = [];
        let studentName = "";
        let timeLeft = 25 * 60; // ২৫ মিনিট
        let countdown;

        // সুপাবেস থেকে প্রশ্ন নিয়ে আসা এবং কুইজ শুরু করা
        async function startQuiz() {
            studentName = document.getElementById('student-name').value.trim();
            if (studentName === "") {
                alert("দয়া করে আপনার নাম লিখুন!");
                return;
            }
            document.getElementById('loading').style.display = 'block';

            try {
                // 'questions' টেবিল থেকে আইডি অনুযায়ী সিরিয়ালি প্রশ্ন আনা হচ্ছে
                const { data, error } = await _supabase
                    .from('questions')
                    .select('*')
                    .order('id', { ascending: true });

                if (error) throw error;
                
                if(data.length === 0) {
                    alert("ডেটাবেজে কোনো প্রশ্ন পাওয়া যায়নি! আগে প্রশ্ন যোগ করুন।");
                    document.getElementById('loading').style.display = 'none';
                    return;
                }

                quizData = data;
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('timer-box').style.display = 'block';
                document.getElementById('quiz-screen').style.display = 'block';
                
                renderQuestions();
                startTimer();
            } catch (error) {
                alert("প্রশ্ন লোড করতে সমস্যা হয়েছে: " + error.message);
                document.getElementById('loading').style.display = 'none';
            }
        }

        // প্রশ্নগুলো স্ক্রিনে সাজানো
        function renderQuestions() {
            const container = document.getElementById('questions-container');
            quizData.forEach((data, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.innerHTML = `<div class="question-text">${index + 1}. ${data.question}</div>`;

                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options-container';

                // অপশনগুলো অ্যারে আকারে সাজানো
                const options = [data.option1, data.option2, data.option3, data.option4];

                options.forEach((option, optIndex) => {
                    if(option !== "" && option !== null) {
                        optionsDiv.innerHTML += `
                            <label class="option-label" id="label-${index}-${optIndex}">
                                <input type="radio" name="question-${index}" value="${optIndex}">
                                ${option}
                            </label>
                        `;
                    }
                });
                card.appendChild(optionsDiv);
                container.appendChild(card);
            });
        }

        // টাইমার
        function startTimer() {
            countdown = setInterval(() => {
                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                document.getElementById('timer').innerText = `${minutes < 10 ? '0'+minutes : minutes}:${seconds < 10 ? '0'+seconds : seconds}`;

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    alert('সময় শেষ! উত্তর অটোমেটিক সাবমিট হচ্ছে।');
                    submitQuiz();
                }
                timeLeft--;
            }, 1000);
        }

        // সাবমিট এবং সুপাবেস-এ রেজাল্ট পাঠানো
        async function submitQuiz() {
            clearInterval(countdown);
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('timer-box').style.display = 'none';
            
            let score = 0;

            quizData.forEach((data, index) => {
                const selected = document.querySelector(`input[name="question-${index}"]:checked`);
                const inputs = document.querySelectorAll(`input[name="question-${index}"]`);
                inputs.forEach(input => input.disabled = true); 

                // সঠিক উত্তর সবুজ করা
                if(document.getElementById(`label-${index}-${data.correct_index}`)) {
                    document.getElementById(`label-${index}-${data.correct_index}`).classList.add('correct-answer');
                }

                if (selected) {
                    const ansIndex = parseInt(selected.value);
                    if (ansIndex === data.correct_index) {
                        score++;
                    } else {
                        if(document.getElementById(`label-${index}-${ansIndex}`)) {
                            document.getElementById(`label-${index}-${ansIndex}`).classList.add('wrong-answer');
                        }
                    }
                }
            });

            // ১. স্ক্রিনে সাথে সাথে স্কোর দেখানো
            const resultBox = document.getElementById('result');
            resultBox.style.display = 'block';
            resultBox.innerHTML = `<strong>ধন্যবাদ ${studentName}!</strong><br>আপনার পরীক্ষা সফলভাবে সম্পন্ন হয়েছে।<br><br><span style="font-size: 26px; color: #198754; font-weight: bold;">আপনার প্রাপ্ত স্কোর: ${score} / ${quizData.length}</span>`;
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // ২. সুপাবেস (Supabase)-এর 'results' টেবিলে রেজাল্ট সেভ করা
            try {
                const { error } = await _supabase
                    .from('results')
                    .insert([
                        { student_name: studentName, score: `${score} / ${quizData.length}` }
                    ]);

                if (error) throw error;
                console.log("Supabase-এ রেজাল্ট সফলভাবে সংরক্ষিত হয়েছে।");
            } catch (error) {
                alert("ডেটাবেজে স্কোর সেভ করতে সমস্যা হয়েছে: " + error.message);
            }
        }
    </script>
</body>
</html>
